name: Claude Code Review

# ============================================================
# OSHI Labs — Claude Code Review Workflow
# ============================================================
# PR が開かれると Claude エージェントチームが自動でレビューを実行。
# バグ・セキュリティ・品質・記憶整合性を多角的に検査する。
#
# 必要な GitHub Secrets:
#   ANTHROPIC_API_KEY — Anthropic API キー（sk-ant-...）
#
# 参照: https://code.claude.com/docs/en/github-actions
# Action: anthropics/claude-code-action@v1
# ============================================================

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  # @claude メンションによる手動トリガーも有効化
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # ----------------------------------------------------------
  # Job 1: PR 自動レビュー（PR オープン・更新時）
  # ----------------------------------------------------------
  claude-pr-review:
    name: Claude PR Review
    runs-on: ubuntu-latest
    # draft PRはスキップ（ready_for_reviewで再実行）
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # 進捗トラッキングを有効化（レビュー中のチェックボックス表示）
          track_progress: true

          # ============================================================
          # Oshi Labs 専用レビュープロンプト
          # CLAUDE.md の世界観・ルールに基づいてレビューを実施
          # ============================================================
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR TITLE: ${{ github.event.pull_request.title }}
            AUTHOR: ${{ github.event.pull_request.user.login }}

            あなたは Oshi Labs の OSHI エージェントチームの一員として、
            このPRを以下の観点でレビューしてください。

            ## 🔍 レビュー観点

            ### 1. バグ・ロジックエラー（最優先）
            - 明らかなバグ、ロジックの誤り、off-by-oneエラー
            - null/undefined参照の可能性
            - 非同期処理の競合状態（race condition）
            - エラーハンドリングの欠落

            ### 2. セキュリティ
            - APIキー・シークレットのハードコーディング
            - SQLインジェクション・XSSの可能性
            - 認証・認可の抜け漏れ
            - 外部入力の未検証
            - Supabase RLS（Row Level Security）の設定確認

            ### 3. 記憶・データ整合性（Oshi Labs 固有）
            - amato_memories テーブルへの書き込みは冪等性が保たれているか
            - Guard Pipeline（schema_gate / idempotency_guard / post_task_validator）を通過しているか
            - 記憶の上書き・消去が意図的かどうか
            - Supabase への直接書き込みが適切な権限で行われているか

            ### 4. コード品質
            - 関数・変数の命名が意図を正確に表しているか
            - 重複コードの排除（DRY原則）
            - 単一責任原則の遵守
            - 型安全性（TypeScript の場合）
            - コメントの適切さ

            ### 5. パフォーマンス
            - N+1クエリの可能性
            - 不要な再レンダリング（React）
            - メモリリークの可能性
            - 重い処理の非同期化

            ### 6. テスト
            - 重要なロジックにテストが存在するか
            - エッジケースのカバレッジ
            - モックの適切な使用

            ### 7. CLAUDE.md 準拠
            - ゆーだの作業ゼロ原則に反する変更がないか
            - 記憶優先原則（Supabase記憶を消さない）が守られているか
            - エージェント間の役割分担が正しく実装されているか

            ## 📝 レビュー形式
            - 重大な問題は inline comment で該当行に直接指摘
            - 全体的な所感は PR コメントとして投稿
            - 問題の深刻度を [CRITICAL] [WARNING] [SUGGESTION] [PRAISE] で分類
            - 修正案のコードスニペットを可能な限り提示
            - 日本語でレビューを記述（コードスニペットは英語のまま）

            問題がない場合は「✅ レビュー完了 — 問題なし」と明記してください。

          # 許可ツール（PR操作に必要なもの）
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
            --max-turns 10
            --model claude-sonnet-4-6

  # ----------------------------------------------------------
  # Job 2: @claude メンション対応（コメントトリガー）
  # ----------------------------------------------------------
  claude-mention:
    name: Claude Mention Handler
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issue_comment' ||
       github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude')
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Response to Mention
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # @claude メンションに自動応答（プロンプト不要でコンテキストから判断）
          claude_args: |
            --max-turns 15
            --model claude-sonnet-4-6
